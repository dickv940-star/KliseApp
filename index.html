<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1">

    <title>Film Scan Studio</title>

    <meta name="theme-color"
          content="#111111">

    <meta name="description"
          content="Film Scan Studio - Scan Klise Processor">

    <link rel="manifest"
          href="manifest.json">

    <link rel="icon"
          href="assets/icon-192.png">

    <link rel="apple-touch-icon"
          href="assets/icon-192.png">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header>

    <img src="assets/logo.png"
         class="logo"
         alt="Logo">

    <h1>Film Scan Studio</h1>

    <p>Scan Klise Processor</p>

</header>

<main>

    <!-- Upload -->

    <section class="upload">

        <h2>Upload Scan Klise</h2>

        <p>

            Klik atau drag & drop foto hasil scan.

            Setelah upload selesai,

            preset akan diterapkan secara otomatis.

        </p>

        <input
            id="upload"
            type="file"
            accept="image/*">

    </section>

    <!-- Canvas -->

    <section>

        <canvas id="canvas"></canvas>

    </section>

    <!-- Export -->

    <section class="buttons">

        <button id="export">

            Export JPG

        </button>

        <button id="exportPNG">

            Export PNG

        </button>

    </section>

</main>

<footer>

    Film Scan Studio

    © 2026

</footer>

<script src="js/image-engine.js"></script>

<script src="js/preset-engine.js"></script>

<script src="js/export.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>

<script>

if("serviceWorker" in navigator){

    window.addEventListener("load",()=>{

        navigator.serviceWorker.register("./service-worker.js")

        .then(()=>{

            console.log("Service Worker Registered");

        })

        .catch(console.error);

    });

}

</script>

</body>

</html>
